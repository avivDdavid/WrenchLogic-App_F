<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WrenchLogic — Engineered Performance</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />

    <!-- Landing styles -->
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="root"></div>

    <!-- React + ReactDOM (production UMD) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Babel standalone (compiles the text/babel scripts below in-browser) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- App sources — order matters:
         data.js sets window.WL, then components → sections → interactive → app -->
    <script type="text/babel" data-presets="react" src="./data.js"></script>
    <script type="text/babel" data-presets="react" src="./components.jsx"></script>
    <script type="text/babel" data-presets="react" src="./sections.jsx"></script>
    <script type="text/babel" data-presets="react" src="./interactive.jsx"></script>
    <script type="text/babel" data-presets="react" src="./app.jsx"></script>
  </body>
</html>
